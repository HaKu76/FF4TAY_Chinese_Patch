name: Build Installer

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet publish src/ff4_patcher.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FF4TAY_Chinese_Patch_Install
          path: publish/FF4TAY_Chinese_Patch_Install.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/FF4TAY_Chinese_Patch_Install.exe
